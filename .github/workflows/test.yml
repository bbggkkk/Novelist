name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: "22"
          cache: npm
      - run: npm ci --cache /tmp/novelist-npm-cache
      - run: npm run verify
